name: Code Quality
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
      - run: pip install pylint black isort mypy
      - run: black --check src/ tests/
      - run: isort --check-only src/ tests/
      - run: pylint src/
      - run: mypy src/
